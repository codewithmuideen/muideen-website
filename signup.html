<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Create an Account</title>
    <link rel="stylesheet" href="index.css">
    <link rel="shortcut icon" href="./logo.png" type="image/x-icon">
</head>
<body>

    <nav>
        <div class="logo">
            <img src="logo.png" alt="Muideen Akinroye">
        </div>

        <div class="menu">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Services</a></li>
            </ul>
        </div>
    </nav>
  <section class="form">
       <form action="">
         <fieldset>
            <legend>Member Registration Form</legend>
            <input type="text" placeholder="FullName" required> <br>
            <input type="email" placeholder="Email" required> <br>
            <input type="phone" placeholder="Phone" required> <br>
            <input type="text" placeholder="Address" required> <br>
            <input type="text" placeholder="Qualification" required> <br>
            <input type="date" placeholder="Qualification" required> <br>
            <input type="password" placeholder="Qualification" required> <br>
            <input type="text" placeholder="Gender" required>  <br>
            <input type="text" placeholder="Address" required> <br>
            <textarea placeholder="Message" cols="30" rows="5"></textarea> <br>
            <button class="sub">Submit</button>
            <button class="can">Cancel</button>
        </fieldset>
       </form>
  </section>
</body>
</html>
